appId: com.crawshrimp.app
productName: 抓虾
copyright: "Copyright © 2025"
electronVersion: "29.4.6"

directories:
  output: dist
  buildResources: assets

mac:
  category: public.app-category.business
  icon: assets/icon.icns
  artifactName: crawshrimp-v${version}-mac-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: assets/icon.ico
  artifactName: crawshrimp-v${version}-win-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 抓虾

dmg:
  title: 抓虾
  backgroundColor: "#ffffff"
  window:
    width: 540
    height: 380

files:
  - "src/**/*"
  - "dist/renderer/**/*"
  - "package.json"
  - "node_modules/**/*"

extraResources:
  # Python scripts (core/ + adapters/)
  - from: "../core"
    to: python-scripts/core
  - from: "../adapters"
    to: python-scripts/adapters
  # Python interpreter (downloaded by scripts/download-python.sh)
  # Actual copy happens in afterPack hook

# afterPack: copies per-arch Python bundle into Resources/python/
afterPack: scripts/after-pack.js

asarUnpack:
  - "**/*.node"
