name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            python_target: mac-arm64,mac-x64
            artifact_suffix: mac
            build_script: build:mac:ci
            artifact_glob: |
              app/dist/*.dmg
              app/dist/*.zip
              app/dist/latest*.yml
          - name: Windows x64
            os: windows-2022
            python_target: win-x64
            artifact_suffix: win-x64
            build_script: build:win
            artifact_glob: |
              app/dist/*.exe
              app/dist/*.exe.blockmap
              app/dist/latest*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Download bundled Python
        working-directory: app
        shell: bash
        env:
          PYTHON_TARGETS: ${{ matrix.python_target }}
        run: bash scripts/download-python.sh

      - name: Build desktop package
        if: matrix.artifact_suffix != 'mac'
        working-directory: app
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Build desktop package
        if: matrix.artifact_suffix == 'mac'
        working-directory: app
        shell: bash
        run: |
          set +e
          npm run ${{ matrix.build_script }} -- --publish never 2>&1 | tee ../mac-build.log
          build_status=${PIPESTATUS[0]}
          set -e

          if [ "${build_status}" -eq 0 ]; then
            exit 0
          fi

          APP_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          expected_files=(
            "dist/crawshrimp-v${APP_VERSION}-mac-arm64.dmg"
            "dist/crawshrimp-v${APP_VERSION}-mac-arm64.zip"
            "dist/crawshrimp-v${APP_VERSION}-mac-x64.dmg"
            "dist/crawshrimp-v${APP_VERSION}-mac-x64.zip"
            "dist/latest-mac.yml"
          )

          missing=0
          for file in "${expected_files[@]}"; do
            if [ ! -s "${file}" ]; then
              echo "::error::Missing expected macOS artifact after failed build: ${file}"
              missing=1
            fi
          done

          if grep -Eq 'Command failed: hdiutil detach|hdiutil:.*(Resource busy|No such file or directory|detach failed)' ../mac-build.log && [ "${missing}" -eq 0 ]; then
            echo "::warning::electron-builder reported an hdiutil detach cleanup failure after producing all macOS artifacts; continuing so artifacts can be uploaded."
            hdiutil info || true
            exit 0
          fi

          exit "${build_status}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawshrimp-${{ matrix.artifact_suffix }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-mac
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-win-x64
          path: release-assets/windows

      - name: Prepare release metadata
        run: |
          APP_VERSION=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          NOTES_FILE="release-notes/v${APP_VERSION}.md"
          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" release-notes.md
          else
            printf '## v%s\n\n- 自动桌面构建\n' "${APP_VERSION}" > release-notes.md
          fi
          printf '\n---\n\n构建信息：\n- Commit: %s\n- Workflow: %s/%s/actions/runs/%s\n- 产物：macOS DMG（Apple Silicon / Intel）、Windows 安装包\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}" >> release-notes.md

      - name: Delete previous rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete desktop-latest --cleanup-tag --yes || true
          git push origin :refs/tags/desktop-latest || true

      - name: Recreate rolling release tag
        run: |
          git tag -d desktop-latest || true
          git tag desktop-latest "${GITHUB_SHA}"
          git push origin refs/tags/desktop-latest

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create desktop-latest \
            release-assets/macos/* \
            release-assets/windows/* \
            --title "抓虾 Desktop Latest v${APP_VERSION}" \
            --notes-file release-notes.md \
            --latest=false

  publish-version-release:
    name: Publish Versioned GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-mac
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-win-x64
          path: release-assets/windows

      - name: Prepare release metadata
        run: |
          APP_VERSION=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${APP_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app/package.json version ${APP_VERSION}" >&2
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          NOTES_FILE="release-notes/v${APP_VERSION}.md"
          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" release-notes.md
          else
            printf '## v%s\n\n- 自动桌面构建\n' "${APP_VERSION}" > release-notes.md
          fi
          printf '\n---\n\n构建信息：\n- Commit: %s\n- Workflow: %s/%s/actions/runs/%s\n- 自动更新元数据：latest.yml / latest-mac.yml\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}" >> release-notes.md

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              release-assets/macos/* \
              release-assets/windows/* \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "抓虾 Desktop v${APP_VERSION}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              release-assets/macos/* \
              release-assets/windows/* \
              --title "抓虾 Desktop v${APP_VERSION}" \
              --notes-file release-notes.md \
              --latest \
              --verify-tag
          fi
