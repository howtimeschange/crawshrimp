name: Build Desktop App

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci failed on attempt ${attempt}; retrying after transient download failure"
            sleep $((attempt * 10))
          done
          npm ci

      - name: Run app tests
        working-directory: app
        run: npm test

      - name: Run adapter JavaScript tests
        run: node --test tests/*.test.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install -r core/requirements.txt

      - name: Run Python tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  build:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            python_target: mac-arm64,mac-x64
            artifact_suffix: mac
            build_script: build:mac:ci
            artifact_glob: |
              app/dist/*.dmg
          - name: Windows x64
            os: windows-2022
            python_target: win-x64
            artifact_suffix: win-x64
            build_script: build:win
            artifact_glob: |
              app/dist/*.exe
              app/dist/*.exe.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci failed on attempt ${attempt}; retrying after transient download failure"
            sleep $((attempt * 10))
          done
          npm ci

      - name: Download bundled Python
        working-directory: app
        shell: bash
        env:
          PYTHON_TARGETS: ${{ matrix.python_target }}
        run: bash scripts/download-python.sh

      - name: Prepare Electron dist
        if: matrix.artifact_suffix == 'mac'
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron.replace(/^[^0-9]*/, '')")
          mkdir -p electron-dist
          for arch in arm64 x64; do
            file="electron-v${ELECTRON_VERSION}-darwin-${arch}.zip"
            url="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${file}"
            downloaded=0
            for attempt in 1 2 3 4 5; do
              if curl -fL --connect-timeout 30 --retry 5 --retry-delay 10 --retry-all-errors -o "electron-dist/${file}.tmp" "${url}"; then
                downloaded=1
                break
              fi
              echo "::warning::Electron ${arch} download failed on attempt ${attempt}; retrying"
              sleep $((attempt * 15))
            done
            if [ "${downloaded}" -ne 1 ]; then
              echo "::error::Failed to download ${file}"
              exit 1
            fi
            test -s "electron-dist/${file}.tmp"
            mv "electron-dist/${file}.tmp" "electron-dist/${file}"
          done

      - name: Prepare Apple notarization credentials
        if: matrix.artifact_suffix == 'mac'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_BASE64:-}" ] || [ -z "${APPLE_API_KEY_ID_SECRET:-}" ] || [ -z "${APPLE_API_ISSUER_SECRET:-}" ]; then
            echo "::notice::Apple notarization secrets are not configured; macOS build will skip notarization."
            exit 0
          fi

          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID_SECRET}.p8"
          printf '%s' "${APPLE_API_KEY_BASE64}" | base64 --decode > "${key_path}"
          chmod 600 "${key_path}"

          {
            echo "APPLE_API_KEY=${key_path}"
            echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID_SECRET}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER_SECRET}"
          } >> "${GITHUB_ENV}"

      - name: Build desktop package
        if: matrix.artifact_suffix != 'mac'
        working-directory: app
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Build desktop package
        if: matrix.artifact_suffix == 'mac'
        working-directory: app
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: "yicheng xing (62AR7GLNK3)"
        run: |
          set +e
          npm run ${{ matrix.build_script }} -- --publish never -c.electronDist=electron-dist 2>&1 | tee ../mac-build.log
          build_status=${PIPESTATUS[0]}
          set -e

          if [ "${build_status}" -eq 0 ]; then
            exit 0
          fi

          APP_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          expected_files=(
            "dist/crawshrimp-v${APP_VERSION}-mac-arm64.dmg"
            "dist/crawshrimp-v${APP_VERSION}-mac-x64.dmg"
          )

          missing=0
          for file in "${expected_files[@]}"; do
            if [ ! -s "${file}" ]; then
              echo "::error::Missing expected macOS artifact after failed build: ${file}"
              missing=1
            fi
          done

          if grep -Eq 'Command failed: hdiutil detach|hdiutil:.*(Resource busy|No such file or directory|detach failed)' ../mac-build.log && [ "${missing}" -eq 0 ]; then
            echo "::warning::electron-builder reported an hdiutil detach cleanup failure after producing all macOS artifacts; continuing so artifacts can be uploaded."
            hdiutil info || true
            exit 0
          fi

          exit "${build_status}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawshrimp-${{ matrix.artifact_suffix }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-mac
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-win-x64
          path: release-assets/windows

      - name: Prepare release metadata
        run: |
          APP_VERSION=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          NOTES_FILE="release-notes/v${APP_VERSION}.md"
          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" release-notes.md
          else
            printf '## v%s\n\n- 自动桌面构建\n' "${APP_VERSION}" > release-notes.md
          fi
          printf '\n---\n\n构建信息：\n- Commit: %s\n- Workflow: %s/%s/actions/runs/%s\n- 产物：macOS DMG（Apple Silicon / Intel）、Windows 安装包\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}" >> release-notes.md

      - name: Delete previous rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete desktop-latest --cleanup-tag --yes || true
          git push origin :refs/tags/desktop-latest || true

      - name: Recreate rolling release tag
        run: |
          git tag -d desktop-latest || true
          git tag desktop-latest "${GITHUB_SHA}"
          git push origin refs/tags/desktop-latest

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create desktop-latest \
            --target "${GITHUB_SHA}" \
            release-assets/macos/* \
            release-assets/windows/* \
            --title "抓虾 Desktop Latest v${APP_VERSION}" \
            --notes-file release-notes.md \
            --latest=false

  publish-version-release:
    name: Publish Versioned GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-mac
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crawshrimp-win-x64
          path: release-assets/windows

      - name: Prepare release metadata
        run: |
          APP_VERSION=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${APP_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app/package.json version ${APP_VERSION}" >&2
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          NOTES_FILE="release-notes/v${APP_VERSION}.md"
          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" release-notes.md
          else
            printf '## v%s\n\n- 自动桌面构建\n' "${APP_VERSION}" > release-notes.md
          fi
          printf '\n---\n\n构建信息：\n- Commit: %s\n- Workflow: %s/%s/actions/runs/%s\n- 自动更新元数据：已关闭，等待签名 / 公证链路完善后恢复\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}" >> release-notes.md

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              release-assets/macos/* \
              release-assets/windows/* \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "抓虾 Desktop v${APP_VERSION}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              release-assets/macos/* \
              release-assets/windows/* \
              --title "抓虾 Desktop v${APP_VERSION}" \
              --notes-file release-notes.md \
              --latest \
              --verify-tag
          fi
