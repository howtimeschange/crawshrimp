id: my-adapter
name: My Adapter
version: 1.0.0
icon: icon.png
author: yourname
description: "What this adapter does"
entry_url: https://example.com
tab_match_prefixes:
  - https://example.com

tasks:
  - id: my_task
    name: My Task
    description: "Scrape a table from the current page"
    script: example-task.js
    entry_url: https://example.com
    tab_match_prefixes:
      - https://example.com
    skip_auth: false
    params:
      - id: mode
        type: radio
        label: Browser mode
        default: current
        options:
          - value: current
            label: Use current tab
          - value: new
            label: Open new tab
        hint: "current mode runs against the focused matching Chrome tab."
      - id: keyword
        type: text
        label: Keyword
        placeholder: "Optional filter keyword"
        required: false
      # Batch-upload example:
      # - id: input_file
      #   type: file_excel
      #   label: Upload Excel
      #   required: true
      #   templates:
      #     - file: templates/input-template.xlsx
      #       label: Excel 填写模板
      #       description: 按字段要求填写后再上传
      #       version: "2026.05"
      #     - file: docs/field-guide.csv
      #       label: CSV 字段说明
      #       description: 字段解释与填写示例
      #       version: "2026.05"
      #   hint: "可先下载模板，按要求填写后再上传"
    trigger:
      type: manual
    output:
      - type: excel
        filename: "result_{date}.xlsx"
        columns:
          - Title
          - URL
          - Page
