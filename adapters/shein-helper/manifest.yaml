id: shein-helper
name: Shein 运营助手
version: 0.1.0
author: crawshrimp
description: "SHEIN 全球商家中心数据抓取与全量导出：商品评价、商品明细"
entry_url: https://sso.geiwohuo.com

auth:
  check_script: auth_check.js
  login_url: https://sso.geiwohuo.com

tasks:
  - id: product_feedback
    name: 商品评价
    description: 抓取 SHEIN 全球商家中心商品评价列表，继承当前页面筛选并自动全量翻页导出
    script: product-feedback.js
    entry_url: https://sso.geiwohuo.com/#/mgs/store-management/product-feedback
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        options:
          - value: current
            label: 使用当前标签页（继承当前筛选）
          - value: new
            label: 新开标签页
      - id: review_date_range
        type: date_range
        label: 评价时间
        hint: 留空则继承当前页面评价时间；填写后会优先尝试按页面时间控件注入，失败时回退到请求体时间覆写
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_商品评价_{time_scope}_{date_range}_{timestamp}.xlsx"

  - id: merchandise_details
    name: 商品分析-商品明细
    description: 抓取 SHEIN 全球商家中心商品分析-商品明细列表，继承当前页面筛选并自动全量翻页导出
    script: merchandise-details.js
    param_probe_script: merchandise-details-param-probe.js
    entry_url: https://sso.geiwohuo.com/#/sbn/merchandise/details
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        hint: current 模式会继承当前页面已选站点、品类、活动标签与统计时间
        options:
          - value: current
            label: 使用当前标签页（继承当前筛选）
          - value: new
            label: 新开标签页
      - id: dimension_scope
        type: radio
        label: 导出维度
        default: current
        options:
          - value: current
            label: 当前列表
          - value: skc
            label: 仅 SKC 列表
          - value: spu
            label: 仅 SPU 列表
          - value: both
            label: SKC + SPU
      - id: time_mode
        type: select
        label: 统计时间
        default: current
        hint: 默认继承当前页面统计时间；切换到昨天/近7天/近30天/自定义时，会在继承其余筛选项的前提下覆盖时间范围
        options:
          - value: current
            label: 继承当前页面
          - value: yesterday
            label: 昨天
          - value: last7
            label: 近7天
          - value: last30
            label: 近30天
          - value: custom
            label: 自定义
      - id: custom_date_range
        type: date_range
        label: 自定义统计时间
        hint: 仅在选择“自定义”后生效，脚本会优先按页面时间控件注入，必要时回退到请求体时间覆写
        visible_when:
          field: time_mode
          equals: custom
      - id: country_site
        type: select
        label: 站点
        default: ""
        hint: 留空则使用页面默认站点；可选项会按当前页面实时探测
        options:
          - value: ""
            label: 使用页面默认站点
      - id: filter_skc
        type: textarea
        label: SKC
        rows: 3
        ui_span: compact
        hint: 支持批量搜索，一行一个；留空则不额外指定
        placeholder: "例如：\nsk25021051271714212\nsa260303103351937770319"
      - id: filter_spu
        type: textarea
        label: SPU
        rows: 3
        ui_span: compact
        hint: 支持批量搜索，一行一个；留空则不额外指定
        placeholder: "例如：\nk250210512717\na2603031033519377"
      - id: onsale_flag
        type: select
        label: 在售状态
        default: ""
        options:
          - value: ""
            label: 不额外指定
          - value: "1"
            label: 在售
          - value: "0"
            label: 非在售
      - id: sale_flag
        type: select
        label: 在架状态
        default: ""
        options:
          - value: ""
            label: 不额外指定
          - value: "1"
            label: 上架
          - value: "0"
            label: 下架
      - id: listing_date_range
        type: date_range
        label: 上架日期
        hint: 留空则不额外指定
      - id: new_goods_tag
        type: checkbox
        label: 新品标签
        default: []
        ui_span: compact
        ui_variant: dropdown_multi
        placeholder: 请选择，可多选
        options:
          - value: "1"
            label: 新品爆款
          - value: "2"
            label: 新品畅销
          - value: "3"
            label: 潜力新品
          - value: "4"
            label: 新品
      - id: layer_nm
        type: checkbox
        label: 商品层次
        default: []
        ui_span: compact
        ui_variant: dropdown_multi
        placeholder: 请选择，可多选
        options:
          - value: "QQK"
            label: QQK
          - value: "保证在售款"
            label: 保证在售款
          - value: "加码"
            label: 加码
          - value: "售完下架"
            label: 售完下架
          - value: "备货款A"
            label: 备货款A
          - value: "备货款B"
            label: 备货款B
          - value: "待处理议价"
            label: 待处理议价
          - value: "新款"
            label: 新款
          - value: "新款A"
            label: 新款A
          - value: "新款未上架"
            label: 新款未上架
          - value: "春夏款"
            label: 春夏款
          - value: "暂不下单"
            label: 暂不下单
          - value: "清仓款"
            label: 清仓款
          - value: "热销断码款"
            label: 热销断码款
          - value: "特殊-赠品"
            label: 特殊-赠品
          - value: "自主下架"
            label: 自主下架
          - value: "自主停产"
            label: 自主停产
          - value: "退供款"
            label: 退供款
          - value: "重复款"
            label: 重复款
          - value: "问题款"
            label: 问题款
      - id: total_quality_level
        type: checkbox
        label: 质量等级
        default: []
        ui_span: compact
        ui_variant: dropdown_multi
        placeholder: 请选择，可多选
        options:
          - value: "A1"
            label: A1
          - value: "A2"
            label: A2
          - value: "B1"
            label: B1
          - value: "B2"
            label: B2
          - value: "C1"
            label: C1
          - value: "C2"
            label: C2
          - value: "D1"
            label: D1
          - value: "D2"
            label: D2
          - value: "不合格-D"
            label: 不合格-D
          - value: "无判断"
            label: 无判断
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_商品分析-商品明细_{time_scope}_{date_range}_{timestamp}.xlsx"
        sheet_key: __sheet_name
        sheets:
          - name: SKC列表
            columns:
              - 商品字段/商品名称
              - 商品字段/SKC
              - 商品字段/SPU
              - 商品字段/货号
              - 商品字段/品类
              - 商品字段/标签
              - 商品基本信息/活动标签
              - 商品基本信息/是否35天转备货
              - 交易/销量
              - 交易/支付订单数
              - 流量/曝光人数
              - 流量/商品访客数
              - 流量/点击率
              - 流量/加车访客
              - 流量/加车次数
              - 流量/加车率
              - 流量/支付人数
              - 流量/支付率
              - 质量/质量等级
              - 质量/评论数
              - 质量/差评率
              - 质量/评论数（支付口径）
              - 质量/差评率（支付口径）
              - 质量/客单退货单数
              - 质量/客单退货件数
              - 质量/质量扣款（CNY）
              - 备货/备货订单数
              - 备货/备货件数
              - 筛选摘要
            column_groups:
              - label: 商品字段
                columns:
                  - 商品字段/商品名称
                  - 商品字段/SKC
                  - 商品字段/SPU
                  - 商品字段/货号
                  - 商品字段/品类
                  - 商品字段/标签
              - label: 商品基本信息
                columns:
                  - 商品基本信息/活动标签
                  - 商品基本信息/是否35天转备货
              - label: 交易
                columns:
                  - 交易/销量
                  - 交易/支付订单数
              - label: 流量
                columns:
                  - 流量/曝光人数
                  - 流量/商品访客数
                  - 流量/点击率
                  - 流量/加车访客
                  - 流量/加车次数
                  - 流量/加车率
                  - 流量/支付人数
                  - 流量/支付率
              - label: 质量
                columns:
                  - 质量/质量等级
                  - 质量/评论数
                  - 质量/差评率
                  - 质量/评论数（支付口径）
                  - 质量/差评率（支付口径）
                  - 质量/客单退货单数
                  - 质量/客单退货件数
                  - 质量/质量扣款（CNY）
              - label: 备货
                columns:
                  - 备货/备货订单数
                  - 备货/备货件数
          - name: SPU列表
            columns:
              - 商品字段/商品名称
              - 商品字段/SPU
              - 商品基本信息/活动标签
              - 交易/销量
              - 交易/支付订单数
              - 流量/商详访客
              - 流量/支付人数
              - 筛选摘要
            column_groups:
              - label: 商品字段
                columns:
                  - 商品字段/商品名称
                  - 商品字段/SPU
              - label: 商品基本信息
                columns:
                  - 商品基本信息/活动标签
              - label: 交易
                columns:
                  - 交易/销量
                  - 交易/支付订单数
              - label: 流量
                columns:
                  - 流量/商详访客
                  - 流量/支付人数
