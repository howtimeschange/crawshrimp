id: shopee-plus-v2
name: Shopee 运营助手
version: 2.0.0
author: crawshrimp
description: "Shopee 卖家后台优惠券批量创建 V2 — 按 SDK 规范重构的稳定版"
entry_url: https://seller.shopee.cn/portal/marketing

auth:
  check_script: auth_check.js
  login_url: https://seller.shopee.cn/portal/marketing

tasks:
  - id: voucher_batch_create
    name: 批量创建优惠券
    description: 根据 Excel 模板逐行在 Shopee 营销中心创建优惠券，支持商店优惠券 / 新买家优惠券 / 回购买家优惠券 / 关注礼优惠券。按站点和店铺自动分组，同店内按 Excel 原顺序执行。
    script: voucher-create.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: current
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: input_file
        type: file_excel
        label: 优惠券设置 Excel
        required: true
        hint: 上传包含“站点、店铺、优惠券领取期限（开始/结束）精确到分、是否提前显示优惠券、优惠券品类、奖励类型、折扣类型、优惠限额、最高优惠金额、最低消费金额、可使用总数、每个买家可用的优惠券数量上限”等列的 Excel 模板
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee优惠券设置结果V2_{datetime}.xlsx"
