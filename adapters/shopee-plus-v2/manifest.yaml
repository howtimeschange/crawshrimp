id: shopee-plus-v2
name: Shopee 运营助手
version: 2.0.5
author: crawshrimp
description: "Shopee 卖家后台运营自动化：优惠券批量创建、直播优惠券创建，以及商业分析数据导出同步"
entry_url: https://seller.shopee.cn/portal/marketing
tab_match_prefixes:
  - https://seller.shopee.cn/portal/marketing
  - https://seller.shopee.cn/datacenter/home

auth:
  check_script: auth_check.js
  login_url: https://seller.shopee.cn/

tasks:
  - id: business_analysis
    name: 【数据】商业分析
    description: 导出 Shopee 卖家中心「商业分析」当前筛选下的官方 Excel，默认沿用页面店铺、统计时间和订单类型筛选，并可同步至数仓。
    script: business-analysis.js
    entry_url: https://seller.shopee.cn/datacenter/home
    tab_match_prefixes:
      - https://seller.shopee.cn/datacenter/home
    skip_auth: false
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        options:
          - value: current
            label: 使用当前登录页
          - value: new
            label: 新开商业分析页
      - id: shop_scope
        type: select
        label: 当前店铺
        default: page
        hint: 默认沿用页面左上角店铺筛选；选择“所有店铺”会导出全店铺商业分析。
        options:
          - value: page
            label: 沿用页面当前筛选
          - value: all
            label: 所有店铺
          - value: current
            label: 当前店铺
      - id: time_range
        type: select
        label: 统计时间
        default: page
        hint: 默认沿用当前 Shopee 页面统计时间；自定义日期会使用整日范围导出。
        options:
          - value: page
            label: 沿用页面当前筛选
          - value: real_time
            label: 今日实时
          - value: yesterday
            label: 昨天
          - value: last7
            label: 最近7天
          - value: last30
            label: 最近30天
          - value: custom
            label: 自定义日期
      - id: date_range
        type: date_range
        label: 自定义日期
        hint: 仅在选择“自定义日期”时填写。
        visible_when:
          field: time_range
          equals: custom
      - id: order_type
        type: select
        label: 订单类型
        default: page
        hint: 默认沿用页面当前订单类型；官方导出会包含各订单状态列，数仓同步会按订单状态拆成长表。
        options:
          - value: page
            label: 沿用页面当前筛选
          - value: placed
            label: 已下订单
          - value: paid
            label: 已付款订单
          - value: confirmed
            label: 已确定订单
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee商业分析_{date_range}_{timestamp}.xlsx"
        columns:
          - 平台名称
          - 数据表
          - 统计时间
          - 店铺名称
          - 市场
          - 指标名称
          - 订单状态
          - 币种
          - 指标值
          - 抓取时间

  - id: voucher_batch_create
    name: 批量创建优惠券
    description: 根据 Excel 模板逐行在 Shopee 营销中心创建优惠券，支持商店优惠券 / 新买家优惠券 / 回购买家优惠券 / 关注礼优惠券。按站点和店铺自动分组，同店内按 Excel 原顺序执行。
    script: voucher-create.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: current
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: input_file
        type: file_excel
        label: 优惠券设置 Excel
        required: true
        templates:
          - file: Shopee优惠券批量设置模板（26.4.1）.xlsx
            label: Excel 填写模板
            description: 标准批量导入模板，支持“是否覆盖已有券”和“优惠券名称/优惠码自定义覆盖”字段；填写优惠券参数后上传到当前任务执行。
            version: "26.4.1"
        hint: 先下载模板并按列填写，再上传包含“站点、店铺、优惠券名称（可选，留空自动生成）、优惠码（可选，留空自动生成；如填写则最多 5 位，仅支持英文字母 A-Z 和数字 0-9）、优惠券领取期限（开始/结束）精确到分、是否提前显示优惠券、优惠券品类、奖励类型、折扣类型、优惠限额、最高优惠金额（无限制填 nocap）、最低消费金额、可使用总数、每个买家可用的优惠券数量上限、是否覆盖已有券”等列的 Excel 文件
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee优惠券设置结果V2_{datetime}.xlsx"
  - id: live_voucher_batch_create
    name: 直播优惠券创建
    description: 根据 Excel 模板批量创建 Shopee 直播优惠券，支持“直播优惠券 / 限定的主播优惠券”两种类型。复用多店铺切换、整表串行和覆盖已有券逻辑；当前版本固定按“全部商品”创建。
    script: live-voucher-create.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: current
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: input_file
        type: file_excel
        label: 直播优惠券设置 Excel
        required: true
        templates:
          - file: Shopee直播优惠券批量设置模板（26.4.8）.xlsx
            label: Excel 填写模板
            description: usecase=6 专用模板，支持“直播优惠券 / 限定的主播优惠券”以及主播用户名列表填写。
            version: "26.4.8"
        hint: 先下载模板并按列填写，再上传包含“站点、店铺、优惠券品类、优惠券领取期限（开始/结束）精确到分、是否提前显示优惠券、主播用户名列表（限定主播券必填）、奖励类型、折扣类型、优惠限额、最高优惠金额（无限制填 nocap）、最低消费金额、可使用总数、每个买家可用的优惠券数量上限、优惠商品范围（当前仅支持全部商品）、是否覆盖已有券”等列的 Excel 文件
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee直播优惠券设置结果_{datetime}.xlsx"
