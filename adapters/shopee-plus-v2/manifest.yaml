id: shopee-plus-v2
name: Shopee 运营助手
version: 2.0.5
author: crawshrimp
description: "Shopee 卖家后台优惠券批量创建 V2 — 按 SDK 规范重构的稳定版"
entry_url: https://seller.shopee.cn/portal/marketing

auth:
  check_script: auth_check.js
  login_url: https://seller.shopee.cn/portal/marketing

tasks:
  - id: voucher_batch_create
    name: 批量创建优惠券
    description: 根据 Excel 模板逐行在 Shopee 营销中心创建优惠券，支持商店优惠券 / 新买家优惠券 / 回购买家优惠券 / 关注礼优惠券。按站点和店铺自动分组，同店内按 Excel 原顺序执行。
    script: voucher-create.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: current
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: input_file
        type: file_excel
        label: 优惠券设置 Excel
        required: true
        templates:
          - file: Shopee优惠券批量设置模板（26.4.1）.xlsx
            label: Excel 填写模板
            description: 标准批量导入模板，支持“是否覆盖已有券”字段；填写优惠券参数后上传到当前任务执行。
            version: "26.4.1"
        hint: 先下载模板并按列填写，再上传包含“站点、店铺、优惠券领取期限（开始/结束）精确到分、是否提前显示优惠券、优惠券品类、奖励类型、折扣类型、优惠限额、最高优惠金额（无限制填 nocap）、最低消费金额、可使用总数、每个买家可用的优惠券数量上限、是否覆盖已有券”等列的 Excel 文件
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee优惠券设置结果V2_{datetime}.xlsx"
  - id: live_voucher_batch_create
    name: 直播优惠券创建
    description: 根据 Excel 模板批量创建 Shopee 直播优惠券，支持“直播优惠券 / 限定的主播优惠券”两种类型。复用多店铺切换、整表串行和覆盖已有券逻辑；当前版本固定按“全部商品”创建。
    script: live-voucher-create.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: current
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: input_file
        type: file_excel
        label: 直播优惠券设置 Excel
        required: true
        templates:
          - file: Shopee直播优惠券批量设置模板（26.4.8）.xlsx
            label: Excel 填写模板
            description: usecase=6 专用模板，支持“直播优惠券 / 限定的主播优惠券”以及主播用户名列表填写。
            version: "26.4.8"
        hint: 先下载模板并按列填写，再上传包含“站点、店铺、优惠券品类、优惠券领取期限（开始/结束）精确到分、是否提前显示优惠券、主播用户名列表（限定主播券必填）、奖励类型、折扣类型、优惠限额、最高优惠金额（无限制填 nocap）、最低消费金额、可使用总数、每个买家可用的优惠券数量上限、优惠商品范围（当前仅支持全部商品）、是否覆盖已有券”等列的 Excel 文件
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Shopee直播优惠券设置结果_{datetime}.xlsx"
