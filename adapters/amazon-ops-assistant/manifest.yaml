id: amazon-ops-assistant
name: 亚马逊运营助手
version: 0.1.0
author: codex
description: "亚马逊运营本地工具：标签 PDF 批量处理、商品 Reviews 全量抓取"
entry_url: https://www.amazon.com/
tab_match_prefixes:
  - https://www.amazon.com/
  - https://amazon.com/

tasks:
  - id: amazon_label_batch_process
    name: 亚马逊标签批量处理
    description: 读取 FNSKU-SKU-标签映射表和多页商品标签 PDF，逐页识别 FNSKU 后拆分并按标签名称输出单页 PDF
    script: amazon-label-batch-process.js
    entry_url: about:blank
    skip_auth: true
    params:
      - id: mapping_file
        type: file_excel
        label: FNSKU-SKU-标签映射表
        required: true
        hint: Excel 需包含 FNSKU 和 标签名称 两列；SKU 列可选，会写入处理结果
      - id: label_pdf
        type: file_pdf
        label: 商品标签 PDF
        required: true
        hint: 选择需要逐页拆分的多页亚马逊商品标签 PDF
      - id: output_mode
        type: select
        label: 输出模式
        default: folder_and_zip
        ui_span: half
        options:
          - value: folder_and_zip
            label: 输出文件夹并打包 ZIP
          - value: folder_only
            label: 仅输出文件夹
        hint: ZIP 会加入任务结果，方便从历史记录中直接下载整包
      - id: package_name
        type: text
        label: 输出包名称
        ui_span: half
        placeholder: "例如：亚马逊标签_本批次"
        hint: 可选。留空则按任务时间自动命名
      - id: export_folder
        type: directory
        label: 导出目录
        placeholder: "点击选择导出目录"
        hint: 可选。选择后会把拆分 PDF 和结果表复制到该目录
        ui_span: half
    trigger:
      type: manual
    output:
      - type: excel
        filename: "亚马逊标签批量处理结果_{timestamp}.xlsx"
        columns:
          - PDF文件
          - 页码
          - 识别FNSKU
          - SKU
          - 标签名称
          - 匹配结果
          - 输出PDF
          - 备注
  - id: amazon_reviews_full_export
    name: Reviews全量抓取
    description: 输入 Amazon 商品链接或 product-reviews 评论页链接，自动翻页抓取全部可见评价并导出 Excel
    script: amazon-reviews-full-export.js
    entry_url: https://www.amazon.com/
    tab_match_prefixes:
      - https://www.amazon.com/
      - https://amazon.com/
    skip_auth: true
    params:
      - id: review_urls
        type: textarea
        label: 商品或评价页链接
        rows: 6
        required: true
        placeholder: "一行一个 Amazon 商品链接或 product-reviews 链接"
        hint: 支持 /dp/ASIN 商品链接和 /product-reviews/ASIN 评论页链接；同一 ASIN 会自动去重。
      - id: max_pages_per_product
        type: number
        label: 每个 ASIN 最多抓取页数
        default: 500
        min: 1
        max: 500
        step: 1
        ui_span: third
        hint: 防止异常分页无限运行；正常会按评论页 Next 按钮自动停止。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "亚马逊Reviews全量抓取_{timestamp}.xlsx"
        columns:
          - ASIN
          - 源链接
          - 商品链接
          - 评论页链接
          - 商品标题
          - 页码
          - 页内序号
          - 评价ID
          - 买家昵称
          - 买家主页
          - 评分
          - 评价标题
          - 评价内容
          - 评价国家
          - 评价时间
          - 评价时间原文
          - 变体信息
          - VerifiedPurchase
          - Helpful票数
          - 评价图片
          - 抓取时间
          - 数据来源
          - 执行结果
          - 备注
