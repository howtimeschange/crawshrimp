id: tmall-ops-assistant
name: 天猫运营助手
version: 0.1.1
author: codex
description: "天猫商品评价抓取、商品编辑页素材预检与运营批量处理"
entry_url: https://detail.tmall.com/item.htm
tab_match_prefixes:
  - https://detail.tmall.com/
  - https://item.taobao.com/
  - https://www.tmall.com/
  - https://rate.tmall.com/

auth:
  check_script: auth_check.js
  login_url: https://login.taobao.com/member/login.jhtml

tasks:
  - id: buyer_reviews
    name: 买家评价抓取
    description: 输入一个或多个天猫商品链接，抓取买家评价、评价时间、规格、图片和追评信息
    script: buyer-reviews.js
    skip_auth: false
    params:
      - id: item_links
        type: textarea
        label: 天猫商品链接
        rows: 6
        required: true
        placeholder: "一行一个天猫商品链接"
        hint: 支持直接粘贴多条链接，也支持用顿号、逗号、空格分隔。运行时会按这里填写的链接抓取。
      - id: page_size
        type: select
        label: 每页评价数
        default: "20"
        ui_span: third
        options:
          - value: "10"
            label: 10 条/页
          - value: "20"
            label: 20 条/页（推荐）
        hint: 天猫 MTop 评价接口在 20 条/页时分页最稳定。
      - id: max_pages
        type: number
        label: 每个商品最多抓取页数
        default: 30
        min: 1
        max: 30
        step: 1
        ui_span: third
        hint: 默认最多尝试 30 页，按接口 hasNext 自动提前停止；天猫可能折叠部分评价，接口只返回可见评价明细。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "天猫买家评价_{timestamp}.xlsx"
        columns:
          - 商品ID
          - SKU_ID
          - 商品链接
          - 商品标题
          - 页码
          - 序号
          - 评价ID
          - 买家昵称
          - 评价时间
          - 评分
          - 规格
          - 评价内容
          - 追评内容
          - 追评时间
          - 评价图片
          - 有图
          - 数据来源
          - 执行结果
          - 备注
  - id: tmall_packaging_upload
    name: 天猫包装图片上传
    description: 上传款号与天猫商品 ID 对照表，从森马云盘按款号下载包装图包，按 1:1 / 3:4 / 商品竖图 / PC详情分组，并对天猫商品编辑页做上传前预检；可选择上传草稿或完整提交发布并同步手机端详情
    script: tmall-packaging-upload.js
    entry_url: https://fmp.semirapp.com/web/index#/home/file
    tab_match_prefixes:
      - https://fmp.semirapp.com/
      - https://iam.semirapp.com/
      - https://sell.publish.tmall.com/
      - https://myseller.taobao.com/
    skip_auth: true
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        options:
          - value: current
            label: 当前页面（推荐）
          - value: new
            label: 全新页面
        hint: 任务会先进入森马云盘下载图包，只有选择“上传到天猫编辑页草稿”时才跳转天猫商品编辑页。
      - id: execute_mode
        type: radio
        label: 执行模式
        default: plan
        options:
          - value: plan
            label: 仅下载并生成预检表（推荐）
          - value: upload_draft
            label: 上传到天猫编辑页草稿
          - value: publish_and_sync_mobile
            label: 完整发布并同步手机端详情
        hint: 上传草稿模式只写入当前编辑页组件，不会提交发布；完整发布模式会优先通过天猫页面 API 提交发布，并把手机端详情按电脑端详情全图生成后再次提交。
      - id: input_file
        type: file_excel
        label: 款号商品ID表格
        required: true
        templates:
          - file: templates/tmall-packaging-upload-template.csv
            label: Excel / CSV 模板
            description: 填写“款号”“天猫商品ID”两列；一个款号对应多个商品 ID 时重复填写多行。可选“云盘路径”覆盖单行图包路径。
            version: "2026.06.30.1"
        hint: 必须包含“款号”“天猫商品ID”两列；款号用于森马云盘找图包，天猫商品 ID 用于进入对应商品编辑页。一个款号对应多个商品 ID 时可重复多行，也可在同一格用逗号或换行分隔多个 ID。
      - id: block_on_style_mismatch
        type: checkbox
        label: 货号不一致时阻止上传
        default: true
        ui_span: third
        hint: 推荐保持开启。检测到天猫编辑页货号与云盘款号不一致时，只输出预检结果，不执行上传。
      - id: enable_ocr_anchor_detection
        type: checkbox
        label: OCR识别疑似锚点图
        default: true
        ui_span: third
        hint: 推荐开启。PC详情结构化锚点预检失败时，按需加载 Tesseract.js 识别当前详情图片，只 OCR 阻塞/疑似锚点样本。
      - id: ocr_max_images
        type: number
        label: OCR最多识别图片数
        default: 80
        min: 1
        max: 160
        step: 1
        ui_span: third
        hint: 仅在锚点预检失败时生效；数值越大越稳但耗时越长，默认足够覆盖大多数详情页。
      - id: cloud_path
        type: text
        label: 云盘路径
        required: true
        default: "巴拉巴拉品牌事业部-市场系统//品牌视觉部/服饰包装组/巴拉服饰产品包装/01-产品包装/2026Q1/正春包装/鞋品/208126140007/"
        placeholder: "巴拉巴拉品牌事业部-市场系统//品牌视觉部/服饰包装组/巴拉服饰产品包装/01-产品包装/2026Q1/正春包装/鞋品/208126140007/"
        hint: 从森马云盘挂载点开始填写，格式为“挂载点//目录/子目录”。如果最后一级是款号文件夹，脚本会按表格行款号自动替换；表格中的“云盘路径”可覆盖单行路径。
        quick_fill_options:
          - 巴拉巴拉品牌事业部-市场系统//品牌视觉部/服饰包装组/巴拉服饰产品包装/01-产品包装/2026Q1/正春包装/鞋品/208126140007/
          - 巴拉营运BU-商品//巴拉货控/02 产品上新模块/2-2 巴拉产品上新/2026年巴拉春/126包装图/鞋品/12.8/208126140007/
      - id: folder_scan_depth
        type: number
        label: 文件夹扫描层级
        default: 3
        min: 0
        max: 8
        step: 1
        ui_span: third
        hint: 已填到款号图包目录时可保持默认；若图包下还有子文件夹，脚本会继续向下扫描。
      - id: export_folder
        type: directory
        label: 导出目录
        placeholder: "点击选择导出目录"
        hint: 可选。点击选择本地目录；留空则使用任务默认输出目录
        ui_span: third
      - id: package_name
        type: text
        label: 导出包名称
        default: 天猫包装图片包
        ui_span: third
        placeholder: "例如：天猫包装图片包"
        hint: 可选。留空则按任务时间自动命名。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "森马天猫包装图片上传结果_{timestamp}.xlsx"
        columns:
          - 表格行号
          - 款号
          - 商品ID
          - 图片用途
          - 文件名
          - 原文件名
          - 云盘路径
          - 下载结果
          - 本地文件
          - 上传结果
          - 天猫图片URL
          - 天猫货号
          - 页面校验
          - 执行结果
          - 备注
