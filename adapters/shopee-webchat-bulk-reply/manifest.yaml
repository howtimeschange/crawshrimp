id: shopee-webchat-bulk-reply
name: Shopee 聊聊批量发信
version: 0.3.0
author: codex
description: "按表格逐行搜索买家会话，并在 Shopee 聊聊中预演或批量发送消息。"
entry_url: https://seller.shopee.cn/webchat/conversations

auth:
  check_script: auth_check.js
  login_url: https://seller.shopee.cn/webchat/conversations

tasks:
  - id: bulk_reply
    name: 批量发信
    description: 按 Excel 逐行搜索买家会话，并在 Shopee 聊聊中预演或发送消息。
    script: bulk-send.js
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        options:
          - value: current
            label: 使用当前标签页
          - value: new
            label: 新开标签页
      - id: run_mode
        type: radio
        label: 运行模式
        default: preview
        options:
          - value: preview
            label: 仅预演
          - value: send
            label: 实际发送
      - id: start_row
        type: number
        label: 起始行
        default: 1
        min: 1
        step: 1
      - id: end_row
        type: number
        label: 结束行
        min: 1
        step: 1
        hint: 留空则默认执行到表格最后一行。
      - id: batch_size
        type: number
        label: 批次大小
        default: 200
        min: 20
        max: 500
        step: 10
        hint: 大表会按批次拆分队列执行，默认每批 200 行。
      - id: input_file
        type: file_excel
        label: 导入 Excel
        required: true
        templates:
          - file: templates/message-template.csv
            label: CSV 模板
            description: 上传前请填写站点、店铺、买家 ID 和发送话术。
            version: "2026.04"
        hint: 必须包含站点、店铺、买家ID、发送话术列。执行完成后会导出结果 Excel。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "ShopeeWebchatBulkReply_{datetime}.xlsx"
