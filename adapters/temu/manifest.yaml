id: temu
name: Temu 运营助手
version: 1.3.1
author: howtimeschange
description: "Temu 卖家后台数据抓取与批量自动化：商品数据、售后、评价、站点商品、商品实拍图洗唛合规"
entry_url: https://agentseller.temu.com

auth:
  check_script: auth_check.js
  login_url: https://seller.temu.com/login

tasks:
  - id: goods_data
    name: 商品数据
    description: 抓取 Temu 商品数据（支付件数、趋势等），支持时间区间筛选
    script: goods-data.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: new
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: time_range
        type: select
        label: 时间区间
        default: ""
        options:
          - value: ""
            label: 默认（不修改）
          - value: "昨日"
            label: 昨日
          - value: "近7日"
            label: 近 7 日
          - value: "近30日"
            label: 近 30 日
          - value: "自定义"
            label: 自定义日期
        hint: 选择「自定义日期」后将出现日期选择器，区间不超过 31 天
      - id: custom_range
        type: date_range
        label: 自定义日期
        hint: 仅在「时间区间」选择“自定义”时生效，区间不超过 31 天
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_商品数据_{time_scope}_{date_range}_{timestamp}.xlsx"

  - id: reviews
    name: 店铺评价
    description: 抓取 Temu 店铺评价列表（评分/文字/时间/图片），支持中英文双语页面
    script: reviews.js
    entry_url: https://www.temu.com
    skip_auth: true
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: new
        options:
          - value: new
            label: 全新页面（推荐）
          - value: current
            label: 在当前页面
      - id: shop_url
        type: text
        label: 店铺链接
        placeholder: "例: https://www.temu.com/mall.html?mall_id=634418214560482"
        hint: 请填写 Temu 店铺主页链接（mall.html?mall_id=...），脚本会自动点击「Reviews/评价」tab
        required: true
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_店铺评价_{timestamp}.xlsx"

  - id: aftersales
    name: 售后数据
    description: 抓取 Temu 商家后台售后管理数据，支持多地区切换
    script: aftersales.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: new
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: regions
        type: checkbox
        label: 地区
        hint: 不选默认抓取全部可用地区
        options:
          - value: 全球
            label: 全球
          - value: 美国
            label: 美国
          - value: 欧区
            label: 欧区
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_售后数据_{region_scope}_{timestamp}.xlsx"

  - id: compliant_live_photos_label
    name: 商品实拍图洗唛合规
    description: 批量处理 Temu 合规中心「商品实拍图」页的标签图上传，优先处理“避免影响商品发货入库”的异常款，并自动提交深度识别。
    script: compliant-live-photos-label.js
    entry_url: https://agentseller.temu.com/govern/compliant-live-photos
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: current
        options:
          - value: current
            label: 使用当前标签页
          - value: new
            label: 新开标签页
      - id: max_products
        type: number
        label: 最大处理款数
        min: 1
        step: 1
        hint: 留空表示持续执行，直到三个快速筛选 tab 中没有待处理商品。
      - id: compensation_mode
        type: radio
        label: 执行范围
        default: normal
        options:
          - value: normal
            label: 正常扫描（可跳过历史已提交 SPU）
          - value: retry_failed_from_file
            label: 仅补偿重试结果文件中的失败 SPU
        hint: 如选择结果文件，脚本会自动按 SPU 跳过其中“已提交/跳过”的历史记录；补偿模式下仅处理文件里“失败”的 SPU。
      - id: retry_result_file
        type: file_excel
        label: 历史结果文件
        hint: 可选。选择上一次导出的结果表（Excel / CSV）后，脚本会按 SPU 跳过已成功的款，并可按失败 SPU 做补偿重试。
      - id: goods_statuses
        type: checkbox
        label: 商品状态
        hint: 默认仅处理「在售中」；可多选，全部取消则不过滤商品状态。
        default:
          - 在售中
        options:
          - value: 在售中
            label: 在售中
          - value: 未发布到站点
            label: 未发布到站点
          - value: 已下架
            label: 已下架
          - value: 已终止
            label: 已终止
          - value: 已删除
            label: 已删除
      - id: clothing_subject_label_images
        type: file_images
        label: 服装主体标签图
        max: 5
        hint: 上传到「商品主体实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
      - id: clothing_package_label_images
        type: file_images
        label: 服装外包装标签图
        max: 5
        hint: 上传到「商品外包装实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
      - id: shoe_subject_label_images
        type: file_images
        label: 鞋品主体标签图
        max: 5
        hint: 上传到「商品主体实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
      - id: shoe_package_label_images
        type: file_images
        label: 鞋品外包装标签图
        max: 5
        hint: 上传到「商品外包装实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "Temu_商品实拍图洗唛合规_{timestamp}.xlsx"
        columns:
          - 执行序号
          - 快速筛选
          - SPU
          - 商品名称
          - 商品分类判断
          - 操作按钮
          - 当前识别状态
          - 售卖影响及建议
          - 处理结果
          - 原因
          - 主体标签图文件数
          - 外包装标签图文件数
          - 深度识别结果

  - id: store_items
    name: 站点商品
    description: 抓取 Temu 店铺商品列表（商品名/图片/角标/价格/评分/评价数/链接），自动加载全量
    script: store-items.js
    entry_url: https://www.temu.com
    skip_auth: true
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: new
        options:
          - value: new
            label: 全新页面（推荐）
          - value: current
            label: 在当前页面
      - id: shop_url
        type: text
        label: 店铺链接
        placeholder: "例: https://www.temu.com/mall.html?mall_id=634418214560482"
        hint: 请填写 Temu 店铺主页链接
        required: true
    trigger:
      type: manual
    output:
      - type: excel
        filename: "{shop_name}_站点商品_{timestamp}.xlsx"
        columns:
          - 商品链接
          - 商品名称
          - 商品图片
          - 商品角标
          - 价格
          - 原价
          - 价格备注
          - 销量
          - 评分
          - 评价数
          - 品牌/店铺标签
          - goods_id
