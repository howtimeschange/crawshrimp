            label: 在售中
          - value: 未发布到站点
            label: 未发布到站点
          - value: 已下架
            label: 已下架
          - value: 已终止
            label: 已终止
          - value: 已删除
            label: 已删除
      - id: clothing_subject_label_images
        type: file_images
        label: 服装主体标签图
        max: 5
        hint: 上传到「商品主体实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
      - id: clothing_package_label_images
        type: file_images
        label: 服装外包装标签图
        max: 5
        hint: 上传到「商品外包装实拍图 > 标签图」，可不传；支持多选，最多 5 张 jpg/png/jpeg。
      - id: shoe_subject_label_images
