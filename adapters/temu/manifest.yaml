id: temu
name: Temu 运营助手
version: 1.2.0
author: howtimeschange
description: "Temu 卖家后台数据抓取：商品数据、售后、评价、店铺商品"
entry_url: https://agentseller.temu.com

auth:
  check_script: auth_check.js
  login_url: https://seller.temu.com/login

tasks:
  - id: goods_data
    name: 商品数据
    description: 抓取 Temu 商品数据（支付件数、趋势等），支持时间区间筛选
    script: goods-data.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: new
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: time_range
        type: select
        label: 时间区间
        default: ""
        options:
          - value: ""
            label: 默认（不修改）
          - value: "昨日"
            label: 昨日
          - value: "近7日"
            label: 近 7 日
          - value: "近30日"
            label: 近 30 日
          - value: "自定义"
            label: 自定义日期
        hint: 选择「自定义日期」后将出现日期选择器，区间不超过 31 天
      - id: custom_range
        type: date_range
        label: 自定义日期
        hint: 仅在「时间区间」选择“自定义”时生效，区间不超过 31 天
    trigger:
      type: manual
    output:
      - type: excel
        filename: "商品数据_{date}.xlsx"

  - id: reviews
    name: 店铺评价
    description: 抓取 Temu 店铺评价列表（评分/文字/时间/图片），支持中英文双语页面
    script: reviews.js
    entry_url: https://www.temu.com
    skip_auth: true
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: new
        options:
          - value: new
            label: 全新页面（推荐）
          - value: current
            label: 在当前页面
      - id: shop_url
        type: text
        label: 店铺链接
        placeholder: "例: https://www.temu.com/mall.html?mall_id=634418214560482"
        hint: 请填写 Temu 店铺主页链接（mall.html?mall_id=...），脚本会自动点击「Reviews/评价」tab
        required: true
    trigger:
      type: interval
      interval_minutes: 60
    output:
      - type: excel
        filename: "店铺评价_{date}.xlsx"

  - id: aftersales
    name: 售后数据
    description: 抓取 Temu 商家后台售后管理数据，支持多地区切换
    script: aftersales.js
    params:
      - id: mode
        type: radio
        label: 登录模式
        default: new
        options:
          - value: current
            label: 在当前页面（已登录）
          - value: new
            label: 全新页面（重新导航）
      - id: regions
        type: checkbox
        label: 地区
        hint: 不选默认抓取全部可用地区
        options:
          - value: 全球
            label: 全球
          - value: 美国
            label: 美国
          - value: 欧区
            label: 欧区
    trigger:
      type: interval
      interval_minutes: 30
    output:
      - type: excel
        filename: "售后数据_{date}.xlsx"

  - id: store_items
    name: 站点商品
    description: 抓取 Temu 店铺商品列表（商品名/价格/评分/链接），自动加载全量
    script: store-items.js
    entry_url: https://www.temu.com
    skip_auth: true
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: new
        options:
          - value: new
            label: 全新页面（推荐）
          - value: current
            label: 在当前页面
      - id: shop_url
        type: text
        label: 店铺链接
        placeholder: "例: https://www.temu.com/mall.html?mall_id=634418214560482"
        hint: 请填写 Temu 店铺主页链接
        required: true
    trigger:
      type: manual
    output:
      - type: excel
        filename: "站点商品_{date}.xlsx"
