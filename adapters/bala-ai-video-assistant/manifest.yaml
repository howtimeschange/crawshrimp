id: bala-ai-video-assistant
name: 巴拉 AI 视频助手
version: 0.1.0
author: codex
description: "巴拉 AI 自制视频链路的素材准备、AI 换图、图生视频、剪辑与发布自动化助手"
entry_url: https://fmp.semirapp.com/web/index#/home/file
tab_match_prefixes:
  - https://fmp.semirapp.com/

auth:
  check_script: auth_check.js
  login_url: https://fmp.semirapp.com/web/index#/home/file

tasks:
  - id: semir_video_material_prepare
    name: 森马云盘视频素材图下载
    description: 按款号在森马云盘搜索并下载 AI 自制视频所需模拍图和商品细节图，优先最新已选/已写文件夹，默认输出本地图包不打 ZIP
    script: semir-video-material-prepare.js
    skip_auth: false
    params:
      - id: mode
        type: radio
        label: 打开方式
        default: new
        options:
          - value: new
            label: 全新页面（推荐）
          - value: current
            label: 当前页面
      - id: cloud_path
        type: text
        label: 云盘搜索根路径
        required: true
        default: "巴拉营运BU-商品//巴拉货控/02 产品上新模块/2-2 巴拉产品上新/"
        placeholder: "巴拉营运BU-商品//巴拉货控/02 产品上新模块/2-2 巴拉产品上新/"
        hint: 从挂载点开始填写搜索根路径；脚本会自动在其下识别模拍原图和平拍原图
        quick_fill_options:
          - 巴拉营运BU-商品//巴拉货控/02 产品上新模块/2-2 巴拉产品上新/
      - id: item_codes
        type: textarea
        label: 款号
        rows: 8
        required: true
        placeholder: "一行一个款号，例如：\n208326102205\n208326105214"
        hint: 支持粘贴多行；若粘贴款色编码，会按款号部分搜索对应素材文件夹
      - id: folder_scan_depth
        type: number
        label: 文件夹扫描层级
        default: 2
        min: 1
        max: 8
        step: 1
        ui_span: third
        hint: 命中文件夹后递归下载图片的层级，默认 2
      - id: duplicate_mode
        type: select
        label: 重复图处理
        default: first_per_hash
        ui_span: third
        options:
          - value: first_per_hash
            label: 同 hash/同名只保留一张（推荐）
          - value: all
            label: 保留全部图片
        hint: 默认按 filehash 去重；没有 hash 时按同名去重
      - id: download_concurrency
        type: number
        label: 下载并发数
        default: 8
        min: 1
        max: 32
        step: 1
        ui_span: third
      - id: max_image_mb
        type: number
        label: 单图压缩阈值 MB
        default: 20
        min: 1
        max: 80
        step: 1
        ui_span: third
        hint: 下载后超过该大小的图片会尝试压缩；默认 20MB
      - id: package_name
        type: text
        label: 导出包名称
        ui_span: third
        placeholder: "例如：巴拉AI视频素材_第一批"
        hint: 可选。留空则按任务时间自动命名
      - id: export_folder
        type: directory
        label: 导出目录
        placeholder: "点击选择导出目录"
        hint: 可选。留空则使用任务默认输出目录
        ui_span: third
    trigger:
      type: manual
    output:
      - type: excel
        filename: "巴拉AI视频素材准备结果_{timestamp}.xlsx"
        columns:
          - 输入款号
          - 输入编码
          - 素材来源
          - 选择文件夹
          - 文件名
          - 云盘路径
          - 文件大小MB
          - 处理动作
          - 下载结果
          - 本地文件
          - 压缩结果
          - 备注

  - id: bala_ai_face_background_generate
    name: AI 换脸/换背景
    description: 选择已下载的模拍素材图，匹配内置巴拉 AI 模特库，批量创建并可异步提交换脸与换背景 AI 生图任务
    script: bala-ai-face-background-generate.js
    entry_url: about:blank
    skip_auth: true
    params:
      - id: source_images
        type: file_images
        label: 待处理图片
        max: 40
        hint: 可直接多选上一步下载的模拍图；如果留空，则从下方素材目录扫描 01_模拍原图
      - id: material_root
        type: directory
        label: 素材根目录
        include_file_listing: true
        placeholder: "选择上一步下载的款号素材目录或整包目录"
        hint: 可选择“巴拉AI视频素材_...”整包目录，也可选择单款目录；脚本会优先读取 01_模拍原图
      - id: source_limit
        type: number
        label: 源图上限
        default: 3
        min: 1
        max: 100
        step: 1
        ui_span: third
        hint: 未直接选择图片时，从目录中最多取多少张源图
      - id: operation_type
        type: select
        label: AI 动作
        default: face_swap
        options:
          - value: face_swap
            label: AI 换脸
          - value: background_swap
            label: AI 换背景
          - value: outfit_swap
            label: AI 换装
          - value: pose_swap
            label: AI 换姿势
        hint: 工作流会从素材选择页带入；原子脚本也可单独选择
      - id: model_groups
        type: checkbox
        label: 模特分组
        ui_variant: dropdown_multi
        default:
          - 100女
        options:
          - value: "66"
            label: 66 新生儿
          - value: 73女
            label: 73 女 婴童
          - value: 73男
            label: 73 男 婴童
          - value: 100女
            label: 100 女 幼童
          - value: 100男
            label: 100 男 幼童
          - value: 140女
            label: 140 女 中大童
          - value: 140男
            label: 140 男 中大童
        hint: 不填写具体模特图 ID 时，会按分组自动挑选模特素材
      - id: model_ref_ids
        type: textarea
        label: 指定模特图 ID
        rows: 4
        placeholder: "一行一个，例如：\n100女/标准.jpg\n100男/正脸.jpg\n73女/微笑.jpg"
        hint: 可选。留空则按上方分组自动选择；内置模型库位于 adapters/bala-ai-video-assistant/assets/model-library/manifest.json
      - id: models_per_group
        type: number
        label: 每组模特数
        default: 1
        min: 1
        max: 12
        step: 1
        ui_span: third
      - id: max_combinations
        type: number
        label: 任务组合上限
        default: 12
        min: 1
        max: 100
        step: 1
        ui_span: third
        hint: 源图 × 模特图的最大组合数量，避免一次提交过多
      - id: background_prompt
        type: textarea
        label: 换背景 Prompt
        rows: 3
        default: "换成马尔代夫的海边"
        placeholder: "例如：换成马尔代夫的海边"
      - id: garment_images
        type: file_images
        label: 换装服装图
        max: 12
        hint: AI 换装时必填；可从本地选择服装平拍或同款图
      - id: outfit_reference_images
        type: file_images
        label: 搭配参考图
        max: 12
        hint: AI 换装时可选，用来提示搭配关系和穿着效果
      - id: variant_reference_images
        type: file_images
        label: 同款不同色参考图
        max: 12
        hint: AI 换装时可选，用来提示版型结构
      - id: pose_prompt
        type: textarea
        label: 换姿势 Prompt
        rows: 3
        placeholder: "例如：让模特自然侧身行走，保留服装版型和颜色"
      - id: prompt_extra
        type: textarea
        label: 补充要求
        rows: 3
        placeholder: "可选，例如：画面自然、有阳光、无文字、保留童装版型和颜色"
        hint: 会追加到每条 AI 生图 Prompt
      - id: generation_mode
        type: radio
        label: 生成方式
        default: submit_async
        options:
          - value: submit_async
            label: 创建并异步生成（推荐）
          - value: create_only
            label: 只创建任务，稍后到 AI 生图工作台手动运行
      - id: review_mode
        type: select
        label: 结果回收
        default: create_review_batch
        ui_span: third
        options:
          - value: create_review_batch
            label: 生成审核池（推荐）
          - value: none
            label: 只输出任务行
      - id: model
        type: select
        label: 生图模型
        default: gpt-image-2
        ui_span: third
        options:
          - value: gpt-image-2
            label: GPT Image
      - id: model_key_tier
        type: select
        label: Key 档位
        default: 4k
        ui_span: third
        options:
          - value: 4k
            label: GPT Image 4K
          - value: 2k
            label: GPT Image 2K
      - id: image_size
        type: select
        label: 输出尺寸
        default: 1536x2048
        ui_span: third
        options:
          - value: 1536x2048
            label: 3:4 竖图 1536×2048
          - value: 2048x2048
            label: 1:1 方图 2048×2048
          - value: 2048x1536
            label: 4:3 横图 2048×1536
          - value: 1024x1024
            label: 1:1 预览 1024×1024
      - id: quality
        type: select
        label: 输出质量
        default: high
        ui_span: third
        options:
          - value: high
            label: high
          - value: medium
            label: medium
          - value: auto
            label: auto
      - id: output_format
        type: select
        label: 输出格式
        default: png
        ui_span: third
        options:
          - value: png
            label: PNG
          - value: jpeg
            label: JPEG
          - value: webp
            label: WEBP
      - id: output_dir
        type: directory
        label: AI 输出目录
        placeholder: "可选，留空则使用 AI 生图默认输出目录"
        ui_span: third
    trigger:
      type: manual
    output:
      - type: excel
        filename: "巴拉AI换脸换背景任务_{timestamp}.xlsx"
        columns:
          - 源图序号
          - 源图文件
          - 款号
          - 操作类型
          - 模特ID
          - 模特分组
          - 模特年龄段
          - 模特性别
          - 模特表情
          - 背景Prompt
          - 服装图文件
          - 搭配参考图文件
          - 同款不同色参考图文件
          - 姿势Prompt
          - 完整Prompt
          - AI任务UID
          - AI任务标题
          - 提交状态
          - 批次UID
          - 运行UID
          - 1XM任务ID
          - 轮询URL
          - 审批批次UID
          - 审批看板
          - 下一步Provider
          - AI生图工作台
          - 执行结果
          - 备注

  - id: qn_img2video_batch
    name: 千牛生意管家图生视频批量生成
    description: 选择已确认 AI 结果图，读取生意管家行业模板，支持模板预览下载、批量上传图片、模板图生视频、任务轮询和视频本地归档
    script: qn-img2video-batch.js
    entry_url: https://quick.taobao.com/videostudio/img2video
    skip_auth: true
    params:
      - id: execute_mode
        type: select
        label: 执行模式
        default: plan
        options:
          - value: plan
            label: 只预检任务
          - value: catalog
            label: 只导出模板目录
          - value: live
            label: live 生成并下载视频
        hint: 建议先导出模板目录/预检，再切 live 批量生成
      - id: material_images
        type: file_images
        label: 待生成图片
        max: 80
        hint: 多选已审批的 AI 结果图；如果留空，则从下方素材目录扫描图片
      - id: material_root
        type: directory
        label: 素材目录
        include_file_listing: true
        placeholder: "选择 AI 结果图目录或整包目录"
        hint: 留空也可以只用上方多选图片；目录扫描会优先 AI 生成图、模拍图、3:4 主图
      - id: image_urls
        type: textarea
        label: 远程图片 URL
        rows: 3
        placeholder: "可选，一行一个图片 URL"
        hint: 已经是在线图片时可以直接填写 URL，脚本会跳过本地上传
      - id: image_limit
        type: number
        label: 图片上限
        default: 20
        min: 1
        max: 200
        step: 1
        ui_span: third
      - id: main_category
        type: text
        label: 行业类目
        default: "童装/婴儿装/亲子装"
        ui_span: third
        hint: 留空时脚本会读取当前店铺类目
      - id: template_id
        type: textarea
        label: 模板 ID
        rows: 3
        placeholder: "可选，一行一个模板 ID；留空按模板关键词或图片数量自动选择"
        hint: 模板 ID 可先用“只导出模板目录”模式获取
      - id: template_match
        type: textarea
        label: 模板关键词
        rows: 3
        placeholder: "例如：领口\n正面/侧面"
        hint: 未填写模板 ID 时，会按模板名称/描述/类目关键词匹配
      - id: group_mode
        type: radio
        label: 图片成片方式
        default: one_image_per_video
        options:
          - value: one_image_per_video
            label: 每张图生成一个视频
          - value: all_images_one_video
            label: 多张图合成一个模板任务
        hint: 当前童装 action 模板通常只用 1 张模特全身图；多图模式主要留给多槽位模板
      - id: prompt
        type: textarea
        label: 视频 Prompt
        rows: 2
        placeholder: "可选；action 模板通常可留空"
      - id: download_template_previews
        type: checkbox
        label: 下载模板预览视频
        default: true
        ui_span: third
        hint: 方便业务在本地先看模板动效
      - id: template_preview_limit
        type: number
        label: 模板预览下载上限
        default: 26
        min: 1
        max: 200
        step: 1
        ui_span: third
      - id: download_videos
        type: checkbox
        label: 生成后下载视频
        default: true
        ui_span: third
      - id: poll_timeout_minutes
        type: number
        label: 单条轮询超时分钟
        default: 12
        min: 1
        max: 120
        step: 1
        ui_span: third
      - id: poll_interval_seconds
        type: number
        label: 轮询间隔秒
        default: 20
        min: 5
        max: 300
        step: 1
        ui_span: third
      - id: submit_delay_ms
        type: number
        label: 提交间隔毫秒
        default: 2000
        min: 0
        max: 60000
        step: 500
        ui_span: third
      - id: download_concurrency
        type: number
        label: 下载并发
        default: 2
        min: 1
        max: 8
        step: 1
        ui_span: third
      - id: output_dir
        type: directory
        label: 视频输出目录
        placeholder: "可选，建议选择 Downloads 下的项目目录"
        hint: 留空则保存到本次任务运行目录；填写后模板预览和生成视频都会按子目录归档
    trigger:
      type: manual
    output:
      - type: excel
        filename: "巴拉AI图生视频批量生成_{timestamp}.xlsx"
        columns:
          - 序号
          - 作业类型
          - 主类目
          - 模板ID
          - 模板名称
          - 模板类型
          - 模板比例
          - 模板时长秒
          - 槽位说明
          - 模板预览URL
          - 模板预览本地文件
          - 模板封面URL
          - 源图文件
          - 源图URL
          - 上传URL
          - 图片数量
          - 分组模式
          - 提交API
          - 提交任务ID
          - 提交SubmitTaskID
          - 任务状态码
          - 任务状态
          - 视频URL
          - 封面URL
          - 内容ID
          - 本地视频文件
          - 执行结果
          - 备注
